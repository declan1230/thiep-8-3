<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 Một điều bất ngờ đang chờ bạn...</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    cursor: default;
  }

  /* ── Firework canvas ── */
  #fireworks-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  /* ── Confetti ── */
  .confetti-piece {
    position: fixed;
    top: -20px;
    width: 10px;
    height: 10px;
    opacity: 0;
    pointer-events: none;
    z-index: 9;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg) scaleX(1);  opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg) scaleX(-1); opacity: 0; }
  }

  /* ── Center stage ── */
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    position: relative;
    z-index: 20;
  }

  .hint {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: #c0748a;
    letter-spacing: 0.08em;
    opacity: 0;
    animation: fadeUp 1s 0.6s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Gift Box ── */
  .gift-wrap {
    position: relative;
    cursor: pointer;
    opacity: 0;
    animation: fadeUp 0.9s 0.2s forwards;
  }

  .gift-box {
    width: 140px;
    height: 140px;
    position: relative;
    transition: transform 0.25s ease;
    filter: drop-shadow(0 12px 32px rgba(215,172,172,0.35));
  }

  .gift-wrap:hover .gift-box {
    transform: scale(1.08) translateY(-6px);
    filter: drop-shadow(0 20px 50px rgba(215,172,172,0.55));
  }

  /* SVG gift box */
  .gift-box svg {
    width: 140px;
    height: 140px;
    overflow: visible;
  }

  /* Bounce animation */
  @keyframes giftBounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-10px); }
  }
  .gift-wrap:not(:hover) .gift-box {
    animation: giftBounce 2.4s ease-in-out infinite;
  }

  /* Lid pop on hover */
  .gift-lid {
    transform-origin: center bottom;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .gift-wrap:hover .gift-lid {
    transform: translateY(-22px) rotate(-8deg);
  }

  /* Sparkles around box */
  .sparkle {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: radial-gradient(circle, #f7c5d5 0%, transparent 70%);
    opacity: 0;
    pointer-events: none;
  }
  .gift-wrap:hover .sparkle { animation: sparklePop 0.6s ease-out forwards; }
  .sparkle:nth-child(1) { top: -10px; left: 50%; animation-delay: 0s !important; }
  .sparkle:nth-child(2) { top: 20%;  left: -15px; animation-delay: 0.08s !important; }
  .sparkle:nth-child(3) { top: 20%;  right: -15px; animation-delay: 0.12s !important; }
  .sparkle:nth-child(4) { bottom: -5px; left: 20%; animation-delay: 0.05s !important; }
  .sparkle:nth-child(5) { bottom: -5px; right: 20%; animation-delay: 0.1s !important; }

  @keyframes sparklePop {
    0%   { opacity: 0; transform: scale(0); }
    50%  { opacity: 1; transform: scale(2.5); }
    100% { opacity: 0; transform: scale(4); }
  }

  .click-hint {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.88rem;
    color: #d4a0b0;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0;
    animation: pulse 2s 1.5s ease-in-out infinite, fadeUp 1s 1s forwards;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50%       { opacity: 1; }
  }

  /* ── Page transition overlay ── */
  .transition-overlay {
    position: fixed;
    inset: 0;
    background: #D7ACAC;
    z-index: 9999;
    transform: scaleY(0);
    transform-origin: bottom;
    pointer-events: none;
  }
  .transition-overlay.animate {
    animation: curtainUp 0.7s cubic-bezier(0.77,0,0.18,1) forwards;
  }
  @keyframes curtainUp {
    0%   { transform: scaleY(0); transform-origin: bottom; }
    100% { transform: scaleY(1); transform-origin: bottom; }
  }

  /* ── Floating petals bg ── */
  .petal {
    position: fixed;
    font-size: 18px;
    opacity: 0.15;
    pointer-events: none;
    animation: floatPetal linear infinite;
  }
  @keyframes floatPetal {
    0%   { transform: translateY(110vh) rotate(0deg); }
    100% { transform: translateY(-10vh) rotate(360deg); }
  }
</style>
</head>
<body>

<canvas id="fireworks-canvas"></canvas>
<div class="transition-overlay" id="overlay"></div>

<!-- Floating petals -->
<div class="petal" style="left:8%;  animation-duration:14s; animation-delay:-3s;  font-size:14px;">🌸</div>
<div class="petal" style="left:22%; animation-duration:18s; animation-delay:-8s;  font-size:10px;">🌷</div>
<div class="petal" style="left:45%; animation-duration:12s; animation-delay:-1s;  font-size:16px;">🌸</div>
<div class="petal" style="left:68%; animation-duration:20s; animation-delay:-5s;  font-size:12px;">🌺</div>
<div class="petal" style="left:85%; animation-duration:16s; animation-delay:-10s; font-size:11px;">🌸</div>

<div class="stage">
  <p class="hint">Có một điều bất ngờ dành cho bạn ✨</p>

  <div class="gift-wrap" id="giftBox" onmouseenter="startEffects()" onmouseleave="stopEffects()" onclick="openGift()">
    <!-- Sparkles -->
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>

    <div class="gift-box">
      <svg viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Box body -->
        <rect x="15" y="70" width="110" height="60" rx="4" fill="#f0c4c4"/>
        <rect x="15" y="70" width="110" height="60" rx="4" stroke="#c98a9a" stroke-width="2"/>
        <!-- Box shadow side -->
        <rect x="100" y="74" width="22" height="52" rx="2" fill="#d9a0a8"/>
        <!-- Ribbon vertical -->
        <rect x="62" y="70" width="16" height="62" rx="2" fill="#e07090"/>
        <!-- Ribbon horizontal (on body) -->
        <rect x="15" y="90" width="110" height="14" rx="2" fill="#e07090"/>

        <!-- Lid group -->
        <g class="gift-lid">
          <!-- Lid base -->
          <rect x="10" y="54" width="120" height="22" rx="4" fill="#f7d6d6"/>
          <rect x="10" y="54" width="120" height="22" rx="4" stroke="#c98a9a" stroke-width="2"/>
          <!-- Lid side -->
          <rect x="105" y="57" width="22" height="16" rx="2" fill="#e0b8b8"/>
          <!-- Ribbon on lid -->
          <rect x="62" y="54" width="16" height="24" rx="2" fill="#e07090"/>

          <!-- Bow loops left -->
          <ellipse cx="55" cy="50" rx="18" ry="11" transform="rotate(-25 55 50)" fill="#f08090" stroke="#c96070" stroke-width="1.5"/>
          <!-- Bow loops right -->
          <ellipse cx="85" cy="50" rx="18" ry="11" transform="rotate(25 85 50)" fill="#f08090" stroke="#c96070" stroke-width="1.5"/>
          <!-- Bow center -->
          <ellipse cx="70" cy="52" rx="9" ry="7" fill="#e55070" stroke="#c04060" stroke-width="1"/>
        </g>

        <!-- Stars/shine -->
        <circle cx="40" cy="95" r="2.5" fill="white" opacity="0.5"/>
        <circle cx="100" cy="108" r="2" fill="white" opacity="0.4"/>
        <circle cx="55" cy="115" r="1.5" fill="white" opacity="0.3"/>
      </svg>
    </div>
  </div>

  <p class="click-hint">Nhấp để mở quà 🎀</p>
</div>

<script>
  /* ─────── Fireworks ─────── */
  const canvas = document.getElementById('fireworks-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, fireworks = [], particles = [], active = false, animId;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COLORS = ['#f7b8c8','#f4a0b0','#e07090','#ffd6e0','#ffb3c6','#ff85a1','#ffc0cb','#ffe4e1','#ff69b4'];

  function rand(a,b){ return Math.random()*(b-a)+a; }

  class Firework {
    constructor() {
      const box = document.getElementById('giftBox').getBoundingClientRect();
      this.x  = box.left + box.width/2 + rand(-40, 40);
      this.y  = box.top  + box.height/2;
      this.tx = rand(W*0.1, W*0.9);
      this.ty = rand(H*0.05, H*0.45);
      this.speed  = rand(6, 12);
      this.color  = COLORS[Math.floor(rand(0, COLORS.length))];
      this.radius = 3;
      this.trail  = [];
      const angle = Math.atan2(this.ty - this.y, this.tx - this.x);
      this.vx = Math.cos(angle) * this.speed;
      this.vy = Math.sin(angle) * this.speed;
      this.done = false;
    }
    update() {
      this.trail.push({x: this.x, y: this.y});
      if (this.trail.length > 8) this.trail.shift();
      this.x += this.vx;
      this.y += this.vy;
      const dx = this.tx - this.x, dy = this.ty - this.y;
      if (Math.sqrt(dx*dx+dy*dy) < 12) {
        this.explode();
        this.done = true;
      }
    }
    explode() {
      for (let i = 0; i < 55; i++) {
        const angle = (Math.PI*2/55)*i + rand(-0.1,0.1);
        const speed = rand(2,7);
        particles.push({
          x: this.x, y: this.y,
          vx: Math.cos(angle)*speed,
          vy: Math.sin(angle)*speed,
          alpha: 1,
          color: COLORS[Math.floor(rand(0, COLORS.length))],
          radius: rand(1.5, 3.5),
          gravity: rand(0.04, 0.1)
        });
      }
    }
    draw() {
      ctx.beginPath();
      for (let i = 0; i < this.trail.length; i++) {
        const t = this.trail[i];
        const a = (i+1)/this.trail.length;
        ctx.strokeStyle = this.color.replace(')', `,${a})`).replace('rgb','rgba').replace('#', 'rgba(').replace('rgba(','rgba(').replace('(', '(');
        if (i===0) ctx.moveTo(t.x, t.y); else ctx.lineTo(t.x, t.y);
      }
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
      ctx.fillStyle = this.color;
      ctx.fill();
    }
  }

  function spawnFirework() {
    if (active) fireworks.push(new Firework());
  }

  function loop() {
    ctx.clearRect(0,0,W,H);
    fireworks = fireworks.filter(f => { f.update(); f.draw(); return !f.done; });
    particles = particles.filter(p => {
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += p.gravity;
      p.alpha -= 0.018;
      if (p.alpha <= 0) return false;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha;
      ctx.fill();
      ctx.globalAlpha = 1;
      return true;
    });
    animId = requestAnimationFrame(loop);
  }

  let spawnInterval;

  function startEffects() {
    if (active) return;
    active = true;
    loop();
    spawnInterval = setInterval(spawnFirework, 220);
    spawnConfetti();
  }

  function stopEffects() {
    active = false;
    clearInterval(spawnInterval);
    cancelAnimationFrame(animId);
    ctx.clearRect(0,0,W,H);
    document.querySelectorAll('.confetti-piece').forEach(el => el.remove());
  }

  /* ─────── Confetti ─────── */
  const confettiColors = ['#f7b8c8','#ffd6e0','#ff85a1','#fff0f3','#e07090','#ffccd5','#fce4ec'];

  function spawnConfetti() {
    if (!active) return;
    for (let i = 0; i < 8; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = rand(0, 100) + 'vw';
      el.style.background = confettiColors[Math.floor(rand(0, confettiColors.length))];
      el.style.width  = rand(6, 12) + 'px';
      el.style.height = rand(6, 14) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = rand(2.5, 5) + 's';
      el.style.animationDelay    = rand(0, 0.8) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 6000);
    }
    if (active) setTimeout(spawnConfetti, 300);
  }

  /* ─────── Open gift → go to card ─────── */
  function openGift() {
    stopEffects();
    // Big burst first
    active = true;
    loop();
    for (let i = 0; i < 5; i++) setTimeout(() => { fireworks.push(new Firework()); }, i * 80);
    for (let i = 0; i < 20; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = rand(20, 80) + 'vw';
      el.style.background = confettiColors[Math.floor(rand(0, confettiColors.length))];
      el.style.width  = rand(8, 16) + 'px';
      el.style.height = rand(8, 18) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
      el.style.animationDuration = rand(2, 4) + 's';
      el.style.animationDelay    = '0s';
      document.body.appendChild(el);
    }
    // Transition curtain then redirect
    setTimeout(() => {
      document.getElementById('overlay').classList.add('animate');
      setTimeout(() => {
        window.location.href = 'card.html';
      }, 750);
    }, 600);
  }
</script>
</body>
</html>
