<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Chúc mừng 8/3 🌸</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #D7ACAC;
    overflow-x: hidden;
    overflow-y: auto;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px 16px;
    background: #D7ACAC;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(255,220,228,0.55) 0%, transparent 65%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(200,130,140,0.35) 0%, transparent 65%),
      radial-gradient(ellipse 40% 40% at 60% 15%, rgba(255,240,245,0.4) 0%, transparent 60%);
    pointer-events: none;
    animation: bgShift 8s ease-in-out infinite alternate;
    z-index: 0;
  }
  @keyframes bgShift { 0% { opacity:0.8; } 100% { opacity:1; } }

  /* Floating petals */
  .petal {
    position: fixed; pointer-events: none;
    animation: petalDrift linear infinite;
    font-size: 18px; z-index: 1; opacity: 0.55;
  }
  @keyframes petalDrift {
    0%   { transform: translateY(-5vh) translateX(0) rotate(0deg); opacity:0; }
    10%  { opacity: 0.55; }
    90%  { opacity: 0.55; }
    100% { transform: translateY(108vh) translateX(60px) rotate(540deg); opacity:0; }
  }

  /* Stars */
  .star {
    position: fixed; border-radius: 50%;
    background: rgba(255,220,225,0.7); pointer-events: none;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity:0.2; transform:scale(1); }
    50%      { opacity:0.9; transform:scale(1.4); }
  }

  /* ═══ MAIN CARD ═══ */
  .card {
    position: relative; z-index: 10;
    width: min(94vw, 500px);
    text-align: center;
    background: rgba(255,243,246,0.32);
    border-radius: 28px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.3) inset,
      0 30px 90px rgba(150,60,80,0.25),
      0 4px 24px rgba(255,200,210,0.35);
    overflow: hidden;
    opacity: 0;
    animation: cardReveal 1.2s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
  }
  @keyframes cardReveal {
    0%   { opacity:0; transform:scale(0.88) translateY(30px); }
    100% { opacity:1; transform:scale(1) translateY(0); }
  }

  /* Shimmer */
  .shimmer-bar {
    position: absolute; top:0; left:-100%; width:60%; height:100%;
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
    border-radius: 28px; pointer-events: none;
    animation: shimmerMove 4.5s ease-in-out 2s infinite;
    z-index: 50;
  }
  @keyframes shimmerMove { 0%{left:-100%;} 40%{left:140%;} 100%{left:140%;} }

  /* ═══ PHOTO FRAME SECTION ═══ */
  .photo-section {
    position: relative;
    padding: 28px 28px 0;
    opacity: 0;
    animation: fadeUp 1s ease 0.7s forwards;
  }

  /* Animated decorative border frame */
  .photo-frame {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    display: inline-block;
    width: 100%;
  }

  /* The 4 animated corner SVG borders */
  .frame-border {
    position: absolute; inset: 0; z-index: 20; pointer-events: none;
    border-radius: 18px;
  }



  /* Photo itself */
  .photo-frame img {
    position: relative; z-index: 10;
    display: block; width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover; object-position: center top;
    border-radius: 16px;
    filter: brightness(1.02) contrast(1.03) saturate(1.08);
  }

  /* Decorative corner flowers on the frame */
  .corner-flower {
    position: absolute; z-index: 30; font-size: 1.6rem;
    filter: drop-shadow(0 2px 6px rgba(200,80,100,0.4));
    animation: cornerFloat 3s ease-in-out infinite;
  }
  .cf-tl { top: 20px;  left: 20px;  animation-delay: 0s; }
  .cf-tr { top: 20px;  right: 20px; animation-delay: 0.5s; }
  .cf-bl { bottom: 4px; left: 20px; animation-delay: 1s; }
  .cf-br { bottom: 4px; right: 20px;animation-delay: 1.5s; }

  @keyframes cornerFloat {
    0%,100% { transform: translateY(0) rotate(0deg) scale(1); }
    50%      { transform: translateY(-5px) rotate(10deg) scale(1.15); }
  }

  /* Top ribbon overlay on photo */
  .photo-ribbon {
    position: absolute; top: 0; left: 0; right: 0; height: 56px; z-index: 25;
    background: linear-gradient(to bottom, rgba(215,172,172,0.6), transparent);
    border-radius: 16px 16px 0 0;
    pointer-events: none;
  }
  .photo-ribbon-bottom {
    position: absolute; bottom: 0; left: 0; right: 0; height: 70px; z-index: 25;
    background: linear-gradient(to top, rgba(215,172,172,0.75), transparent);
    border-radius: 0 0 16px 16px;
    pointer-events: none;
  }

  /* Floating hearts over photo */
  .float-heart {
    position: absolute; z-index: 28; font-size: 1.1rem;
    animation: heartFloat linear infinite;
    pointer-events: none; opacity: 0;
  }
  @keyframes heartFloat {
    0%   { transform: translateY(0) scale(1); opacity: 0; }
    15%  { opacity: 0.9; }
    85%  { opacity: 0.7; }
    100% { transform: translateY(-80px) scale(0.6); opacity: 0; }
  }

  /* ═══ CARD CONTENT ═══ */
  .card-content {
    padding: 24px 32px 36px;
  }

  .date-badge {
    display: inline-block;
    font-family: 'Dancing Script', cursive;
    font-size: 5rem; font-weight: 700;
    color: #040720; line-height: 1;
    position: relative;
    opacity: 0;
    animation: slideDown 0.9s cubic-bezier(0.34,1.56,0.64,1) 1.2s forwards;
  }
  .date-badge::before { content:'✿'; position:absolute; left:-34px; top:8px; font-size:1.4rem; opacity:0.7; animation:spin 8s linear infinite; }
  .date-badge::after  { content:'✿'; position:absolute; right:-34px; top:8px; font-size:1.4rem; opacity:0.7; animation:spin 8s linear infinite reverse; }
  @keyframes spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  @keyframes slideDown {
    0%   { opacity:0; transform:translateY(-20px) scale(0.9); }
    100% { opacity:1; transform:translateY(0) scale(1); }
  }

  .divider {
    margin: 16px auto 18px;
    display: flex; align-items: center; gap: 10px; justify-content: center;
    opacity: 0; animation: fadeIn 0.8s ease 1.6s forwards;
  }
  .divider-line { flex:1; max-width:70px; height:1px; background:linear-gradient(90deg, transparent, #c08088, transparent); }
  .divider-icon { font-size:1.1rem; color:#b06070; }

  .message {
    font-family: 'Playfair Display', serif;
    font-style: italic; font-size: 1.65rem; font-weight: 400;
    color: #040720; line-height: 1.4;
    opacity: 0; animation: fadeUp 0.9s ease 1.8s forwards;
  }
  .message .highlight { font-weight: 700; }

  .sub-message {
    margin-top: 14px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 1rem;
    color: rgba(4,7,32,0.65); line-height: 1.7;
    opacity: 0; animation: fadeUp 0.9s ease 2.1s forwards;
  }

  .hearts {
    margin-top: 22px; font-size: 1.3rem;
    opacity: 0; animation: fadeIn 1s ease 2.4s forwards;
    letter-spacing: 0.2em;
  }
  .heart-beat { display:inline-block; animation:heartbeat 1.4s ease-in-out infinite; }
  @keyframes heartbeat {
    0%,100% { transform:scale(1); }
    30%      { transform:scale(1.3); }
    60%      { transform:scale(1.1); }
  }

  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── Music button ── */
  #music-btn {
    position: fixed; bottom:28px; right:28px; z-index:100;
    width:48px; height:48px; border-radius:50%;
    border:1.5px solid rgba(200,140,155,0.5);
    background:rgba(255,240,244,0.9);
    backdrop-filter:blur(10px);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:1.3rem;
    box-shadow:0 4px 20px rgba(200,100,120,0.25);
    transition:transform 0.2s ease, box-shadow 0.2s ease;
    opacity:0; animation:fadeIn 1s 2.8s forwards;
  }
  #music-btn:hover { transform:scale(1.12); box-shadow:0 6px 28px rgba(200,100,120,0.4); }
  #music-btn.playing .note { animation:notePulse 1.6s ease-in-out infinite; }
  @keyframes notePulse { 0%,100%{transform:scale(1) rotate(0deg);} 50%{transform:scale(1.2) rotate(12deg);} }

  .music-waves {
    position:fixed; bottom:32px; right:84px;
    display:flex; align-items:flex-end; gap:3px; height:20px;
    opacity:0; transition:opacity 0.4s; pointer-events:none;
  }
  .music-waves.show { opacity:1; }
  .music-waves span {
    display:block; width:3px; background:#c07080; border-radius:2px;
    animation:wave 0.8s ease-in-out infinite;
  }
  .music-waves span:nth-child(1){height:8px; animation-delay:0s;}
  .music-waves span:nth-child(2){height:16px;animation-delay:0.15s;}
  .music-waves span:nth-child(3){height:12px;animation-delay:0.3s;}
  .music-waves span:nth-child(4){height:18px;animation-delay:0.1s;}
  .music-waves span:nth-child(5){height:10px;animation-delay:0.25s;}
  @keyframes wave { 0%,100%{transform:scaleY(0.4);} 50%{transform:scaleY(1);} }
</style>
</head>
<body>

<!-- Music button -->
<div class="music-waves" id="waves">
  <span></span><span></span><span></span><span></span><span></span>
</div>
<button id="music-btn" onclick="toggleMusic()" title="Bật/tắt nhạc">
  <span class="note">🎵</span>
</button>

<!-- Floating petals -->
<div class="petal" style="left:5%;  animation-duration:12s; animation-delay:0s;">🌸</div>
<div class="petal" style="left:15%; animation-duration:16s; animation-delay:-4s; font-size:13px;">🌷</div>
<div class="petal" style="left:28%; animation-duration:14s; animation-delay:-7s;">🌸</div>
<div class="petal" style="left:42%; animation-duration:20s; animation-delay:-2s; font-size:14px;">🌺</div>
<div class="petal" style="left:58%; animation-duration:11s; animation-delay:-9s; font-size:12px;">🌸</div>
<div class="petal" style="left:72%; animation-duration:17s; animation-delay:-5s;">🌷</div>
<div class="petal" style="left:85%; animation-duration:13s; animation-delay:-1s; font-size:16px;">🌸</div>
<div class="petal" style="left:93%; animation-duration:15s; animation-delay:-6s; font-size:11px;">🌺</div>

<!-- Stars -->

    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 4 + 2;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s;`;
    document.body.appendChild(s);
  }
</script>

      <div class="corner-flower cf-bl">🌺</div>

    <div class="date-badge">8/3</div>

      <div class="divider-line"></div>
      <span class="divider-icon">✦</span>
      <div class="divider-line"></div>
    </div>

      <span class="highlight">Chúc vợ 8/3 vui vẻ</span>
    </p>

    <p class="sub-message">
      Mỗi ngày bên em đều là một ngày<br>đặc biệt và hạnh phúc nhất 🌷
    </p>

    <div class="hearts">
      <span class="heart-beat">💗</span>
      &nbsp;💕&nbsp;
      <span class="heart-beat" style="animation-delay:0.4s">💗</span>
    </div>
  </div>

<script>
  /* ── Floating hearts over photo ── */
  const hc = document.getElementById('heart-container');
  const heartEmojis = ['💗','💕','💖','🌸','✨','💝'];
  function spawnHeart() {
    const el = document.createElement('div');
    el.className = 'float-heart';
    el.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
    el.style.left   = (10 + Math.random()*80) + '%';
    el.style.bottom = (5 + Math.random()*30) + '%';
    el.style.animationDuration = (3 + Math.random()*3) + 's';
    el.style.animationDelay    = (Math.random()*2) + 's';
    hc.appendChild(el);
    setTimeout(() => el.remove(), 7000);
  }
  setInterval(spawnHeart, 800);

  /* ─────── Music: Beautiful in White - Westlife ─────── */
  const bgm = new Audio('music.mp3');
  bgm.loop = true;
  bgm.volume = 0;

  let musicPlaying = false;

  function fadeInMusic() {
    bgm.volume = 0;
    bgm.play().catch(() => {});
    let vol = 0;
    const timer = setInterval(() => {
      vol = Math.min(vol + 0.02, 0.75);
      bgm.volume = vol;
      if (vol >= 0.75) clearInterval(timer);
    }, 80);
  }

  function fadeOutMusic() {
    let vol = bgm.volume;
    const timer = setInterval(() => {
      vol = Math.max(vol - 0.03, 0);
      bgm.volume = vol;
      if (vol <= 0) { clearInterval(timer); bgm.pause(); bgm.currentTime = 0; }
    }, 60);
  }

  function startMusic() {
    musicPlaying = true;
    fadeInMusic();
    document.getElementById('music-btn').classList.add('playing');
    document.getElementById('waves').classList.add('show');
  }

  function stopMusic() {
    musicPlaying = false;
    fadeOutMusic();
    document.getElementById('music-btn').classList.remove('playing');
    document.getElementById('waves').classList.remove('show');
  }

  function toggleMusic() { if (!musicPlaying) startMusic(); else stopMusic(); }

  let autoStarted = false;
  function tryAutoStart() {
    if (!autoStarted) { autoStarted = true; startMusic(); }
  }
  document.addEventListener('click',      tryAutoStart, { once: true });
  document.addEventListener('mousemove',  tryAutoStart, { once: true });
  document.addEventListener('touchstart', tryAutoStart, { once: true });
</script>
