<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Chúc mừng 8/3 🌸</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #D7ACAC;
    overflow: hidden;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #D7ACAC;
  }

  /* ── Animated soft bg texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(255,220,228,0.55) 0%, transparent 65%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(200,130,140,0.35) 0%, transparent 65%),
      radial-gradient(ellipse 40% 40% at 60% 15%, rgba(255,240,245,0.4) 0%, transparent 60%);
    pointer-events: none;
    animation: bgShift 8s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0%   { opacity: 0.8; }
    100% { opacity: 1; }
  }

  /* ── Floating petals ── */
  .petal {
    position: fixed;
    pointer-events: none;
    animation: petalDrift linear infinite;
    font-size: 18px;
    z-index: 1;
    opacity: 0.6;
  }
  @keyframes petalDrift {
    0%   { transform: translateY(-5vh) translateX(0) rotate(0deg);   opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(108vh) translateX(60px) rotate(540deg); opacity: 0; }
  }

  /* ── Main card ── */
  .card {
    position: relative;
    z-index: 10;
    width: min(92vw, 480px);
    padding: 52px 44px 56px;
    text-align: center;
    background: rgba(255,240,244,0.28);
    border: 1.5px solid rgba(255,210,218,0.55);
    border-radius: 24px;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.25) inset,
      0 24px 80px rgba(160,70,90,0.22),
      0 4px 20px rgba(255,200,210,0.3);
    opacity: 0;
    animation: cardReveal 1.2s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
  }

  @keyframes cardReveal {
    0%   { opacity: 0; transform: scale(0.88) translateY(30px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ── Date badge ── */
  .date-badge {
    display: inline-block;
    font-family: 'Dancing Script', cursive;
    font-size: 5.5rem;
    font-weight: 700;
    color: #040720;
    line-height: 1;
    letter-spacing: -0.01em;
    position: relative;
    opacity: 0;
    animation: slideDown 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.9s forwards;
  }

  .date-badge::before {
    content: '✿';
    position: absolute;
    left: -38px; top: 8px;
    font-size: 1.5rem;
    opacity: 0.7;
    animation: spin 8s linear infinite;
  }
  .date-badge::after {
    content: '✿';
    position: absolute;
    right: -38px; top: 8px;
    font-size: 1.5rem;
    opacity: 0.7;
    animation: spin 8s linear infinite reverse;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  @keyframes slideDown {
    0%   { opacity: 0; transform: translateY(-20px) scale(0.9); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Divider ── */
  .divider {
    margin: 22px auto 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    opacity: 0;
    animation: fadeIn 0.8s ease 1.3s forwards;
  }
  .divider-line {
    flex: 1;
    max-width: 70px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c08088, transparent);
  }
  .divider-icon {
    font-size: 1.1rem;
    color: #b06070;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── Main message ── */
  .message {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.75rem;
    font-weight: 400;
    color: #040720;
    line-height: 1.4;
    letter-spacing: 0.01em;
    opacity: 0;
    animation: fadeUp 0.9s ease 1.5s forwards;
  }

  .message .highlight {
    font-weight: 700;
    font-style: italic;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Sub message ── */
  .sub-message {
    margin-top: 18px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: rgba(4,7,32,0.65);
    line-height: 1.7;
    opacity: 0;
    animation: fadeUp 0.9s ease 1.8s forwards;
  }

  /* ── Heart decoration ── */
  .hearts {
    margin-top: 30px;
    font-size: 1.3rem;
    opacity: 0;
    animation: fadeIn 1s ease 2.1s forwards;
    letter-spacing: 0.2em;
  }

  .heart-beat {
    display: inline-block;
    animation: heartbeat 1.4s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    30%       { transform: scale(1.3); }
    60%       { transform: scale(1.1); }
  }

  /* ── Corner florals ── */
  .corner {
    position: absolute;
    font-size: 1.6rem;
    opacity: 0;
    animation: fadeIn 1s ease 2.3s forwards;
  }
  .corner-tl { top: 14px;  left: 16px; }
  .corner-tr { top: 14px;  right: 16px; transform: scaleX(-1); }
  .corner-bl { bottom: 14px; left: 16px; transform: scaleY(-1); }
  .corner-br { bottom: 14px; right: 16px; transform: scale(-1); }

  /* ── Shimmer lines ── */
  .shimmer-bar {
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.18) 50%, transparent 60%);
    border-radius: 24px;
    pointer-events: none;
    animation: shimmerMove 4s ease-in-out 2s infinite;
  }
  @keyframes shimmerMove {
    0%   { left: -100%; }
    40%  { left: 140%; }
    100% { left: 140%; }
  }

  /* ── Stars BG ── */
  .star {
    position: fixed;
    border-radius: 50%;
    background: rgba(255,220,225,0.7);
    pointer-events: none;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.2; transform: scale(1); }
    50%      { opacity: 0.9; transform: scale(1.4); }
  }
</style>
</head>
<body>

<!-- Floating petals -->
<div class="petal" style="left:5%;  animation-duration:12s; animation-delay:0s;">🌸</div>
<div class="petal" style="left:15%; animation-duration:16s; animation-delay:-4s; font-size:13px;">🌷</div>
<div class="petal" style="left:28%; animation-duration:14s; animation-delay:-7s;">🌸</div>
<div class="petal" style="left:42%; animation-duration:20s; animation-delay:-2s; font-size:14px;">🌺</div>
<div class="petal" style="left:58%; animation-duration:11s; animation-delay:-9s; font-size:12px;">🌸</div>
<div class="petal" style="left:72%; animation-duration:17s; animation-delay:-5s;">🌷</div>
<div class="petal" style="left:85%; animation-duration:13s; animation-delay:-1s; font-size:16px;">🌸</div>
<div class="petal" style="left:93%; animation-duration:15s; animation-delay:-6s; font-size:11px;">🌺</div>

<!-- Twinkling stars -->
<script>
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 4 + 2;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}vw; top:${Math.random()*100}vh;
      animation-duration:${2 + Math.random()*4}s;
      animation-delay:${Math.random()*4}s;
    `;
    document.body.appendChild(s);
  }
</script>

<!-- The card -->
<div class="card">
  <div class="shimmer-bar"></div>

  <div class="corner corner-tl">🌸</div>
  <div class="corner corner-tr">🌸</div>
  <div class="corner corner-bl">🌸</div>
  <div class="corner corner-br">🌸</div>

  <div class="date-badge">8/3</div>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-icon">✦</span>
    <div class="divider-line"></div>
  </div>

  <p class="message">
    <span class="highlight">Chúc vợ 8/3 vui vẻ</span>
  </p>

  <p class="sub-message">
    Mỗi ngày bên em đều là một ngày<br>đặc biệt và hạnh phúc nhất 🌷
  </p>

  <div class="hearts">
    <span class="heart-beat">💗</span>
    &nbsp;💕&nbsp;
    <span class="heart-beat" style="animation-delay:0.4s">💗</span>
  </div>
</div>

</body>
</html>
